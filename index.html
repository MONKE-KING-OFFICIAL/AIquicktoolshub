<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTools Hub</title>
    <!-- Tailwind CSS for layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Our custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-900 mb-2">QuickTools Hub</h1>
            <p class="text-gray-600">Simple, fast, and local utilities for your daily workflow.</p>
        </header>

        <!-- Navigation Grid -->
        <nav class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <button id="btn-password" class="nav-btn active glass-card p-4 flex flex-col items-center transition-all hover:bg-white">
                <i class="fas fa-key mb-2 text-xl"></i>
                <span class="text-sm font-semibold">Passwords</span>
            </button>
            <button id="btn-converter" class="nav-btn glass-card p-4 flex flex-col items-center transition-all hover:bg-white">
                <i class="fas fa-exchange-alt mb-2 text-xl"></i>
                <span class="text-sm font-semibold">Converter</span>
            </button>
            <button id="btn-text" class="nav-btn glass-card p-4 flex flex-col items-center transition-all hover:bg-white">
                <i class="fas fa-font mb-2 text-xl"></i>
                <span class="text-sm font-semibold">Text Tools</span>
            </button>
            <button id="btn-timer" class="nav-btn glass-card p-4 flex flex-col items-center transition-all hover:bg-white">
                <i class="fas fa-stopwatch mb-2 text-xl"></i>
                <span class="text-sm font-semibold">Focus Timer</span>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="glass-card p-6 md:p-10 min-h-[400px]">
            
            <!-- Password Generator -->
            <section id="tool-password" class="tool-section active">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Secure Password Generator</h2>
                <div class="space-y-6">
                    <div class="relative">
                        <input type="text" id="pass-output" readonly class="w-full p-4 bg-white border border-gray-200 rounded-lg text-xl font-mono text-center pr-12" placeholder="Generated Password">
                        <button id="copy-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-indigo-600">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Length: <span id="len-val">16</span></label>
                            <input type="range" id="pass-length" min="8" max="50" value="16" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                        <div class="space-y-2">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="pass-upper" checked class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <span class="text-gray-700">Uppercase Letters</span>
                            </label>
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="pass-numbers" checked class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <span class="text-gray-700">Numbers</span>
                            </label>
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="checkbox" id="pass-symbols" checked class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                <span class="text-gray-700">Symbols</span>
                            </label>
                        </div>
                    </div>
                    <button id="gen-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-colors">Generate Password</button>
                </div>
            </section>

            <!-- Unit Converter -->
            <section id="tool-converter" class="tool-section">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Quick Converter</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">From (Pixels)</label>
                            <input type="number" id="conv-px" class="w-full p-3 border border-gray-200 rounded-lg" placeholder="px">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">To (REM)</label>
                            <input type="number" id="conv-rem" class="w-full p-3 border border-gray-200 rounded-lg" placeholder="rem">
                        </div>
                    </div>
                    <hr class="my-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Celsius</label>
                            <input type="number" id="conv-c" class="w-full p-3 border border-gray-200 rounded-lg" placeholder="°C">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fahrenheit</label>
                            <input type="number" id="conv-f" class="w-full p-3 border border-gray-200 rounded-lg" placeholder="°F">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Text Analyzer -->
            <section id="tool-text" class="tool-section">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Text Analyzer</h2>
                <textarea id="text-input" class="w-full h-40 p-4 border border-gray-200 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Paste your text here..."></textarea>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div class="p-3 bg-white rounded-lg border border-gray-100 shadow-sm">
                        <div id="word-count" class="text-2xl font-bold text-indigo-600">0</div>
                        <div class="text-xs text-gray-500 uppercase">Words</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-100 shadow-sm">
                        <div id="char-count" class="text-2xl font-bold text-indigo-600">0</div>
                        <div class="text-xs text-gray-500 uppercase">Characters</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-100 shadow-sm">
                        <div id="reading-time" class="text-2xl font-bold text-indigo-600">0</div>
                        <div class="text-xs text-gray-500 uppercase">Min Read</div>
                    </div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button id="text-upper" class="text-xs bg-gray-100 px-3 py-1 rounded hover:bg-gray-200 uppercase font-semibold">Uppercase</button>
                    <button id="text-lower" class="text-xs bg-gray-100 px-3 py-1 rounded hover:bg-gray-200 uppercase font-semibold">Lowercase</button>
                    <button id="text-clear" class="text-xs bg-red-50 px-3 py-1 rounded hover:bg-red-100 text-red-600 uppercase font-semibold">Clear</button>
                </div>
            </section>

            <!-- Focus Timer -->
            <section id="tool-timer" class="tool-section text-center">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">Focus Timer</h2>
                <div class="text-7xl font-mono font-bold text-indigo-600 mb-8" id="timer-display">25:00</div>
                <div class="flex justify-center gap-4">
                    <button id="timer-start" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700 transition-transform active:scale-95">Start</button>
                    <button id="timer-reset" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-full font-bold hover:bg-gray-300 transition-transform active:scale-95">Reset</button>
                </div>
                <div class="mt-8 flex justify-center gap-2">
                    <button id="set-pomodoro" class="text-xs border border-indigo-200 px-4 py-2 rounded-full hover:bg-indigo-50">Pomodoro (25m)</button>
                    <button id="set-short" class="text-xs border border-indigo-200 px-4 py-2 rounded-full hover:bg-indigo-50">Short Break (5m)</button>
                </div>
            </section>

        </main>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none text-sm font-medium z-50">
            Copied to clipboard!
        </div>

        <footer class="mt-12 text-center text-gray-400 text-sm">
            &copy; 2024 QuickTools Hub &bull; Privacy Friendly (Data stays on your device)
        </footer>
    </div>

    <!-- Our custom logic -->
    <script src="script.js"></script>
</body>
</html>
